<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>코인 리포트</title>
  <style>
    body {
      margin: 0;
      background: #f4f6f8;
      color: #17202a;
      font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 18px;
    }
    .hero {
      background: #111827;
      color: #fff;
      border-radius: 8px;
      padding: 26px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: 0;
    }
    h2 {
      margin: 0 0 14px;
      font-size: 20px;
      letter-spacing: 0;
    }
    p { line-height: 1.65; }
    .hero p {
      color: #e5e7eb;
      margin: 10px 0 0;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin: 0 0 16px;
    }
    .tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 96px;
      min-height: 40px;
      padding: 0 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
      color: #374151;
      text-decoration: none;
      font-weight: 800;
    }
    .tab.active {
      background: #111827;
      border-color: #111827;
      color: #fff;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid #edf2f7;
      text-align: left;
      vertical-align: top;
    }
    th {
      color: #374151;
      background: #f9fafb;
    }
    a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
    }
    .empty {
      color: #64748b;
      text-align: center;
    }
    .muted {
      color: #64748b;
      font-size: 13px;
    }
    @media (max-width: 760px) {
      main { padding: 18px 12px; }
      h1 { font-size: 24px; }
      .tabs { display: grid; grid-template-columns: 1fr 1fr; }
      .tab { min-width: 0; }
      table { font-size: 13px; }
      th, td { padding: 8px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>코인 리포트</h1>
      <p>비트코인, 이더리움, 주요 알트코인 흐름을 별도로 모아두는 대시보드입니다.</p>
    </section>

    <nav class="tabs" aria-label="리포트 분류">
      <a class="tab" href="../">주식</a>
      <a class="tab active" href="./">코인</a>
    </nav>

    <section class="card">
      <h2>최근 코인 리포트</h2>
      <table>
        <thead>
          <tr>
            <th>날짜</th>
            <th>유형</th>
            <th>보기</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="3" class="empty">아직 등록된 코인 리포트가 없습니다.</td>
          </tr>
        </tbody>
      </table>
      <p class="muted">코인 리포트를 만들면 이 목록에 최신 항목부터 추가됩니다.</p>
    </section>
  </main>
</body>
</html>
